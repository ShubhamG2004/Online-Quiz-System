# Database Configuration
# Update these values based on your MySQL setup

# Database Connection Settings
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/quizdb
db.username=root
db.password=password

# Database Properties
db.pool.size=10
db.max.connections=20

# MySQL Character Set
db.charset=utf8mb4
db.collation=utf8mb4_unicode_ci

# Timezone
db.timezone=UTC

# Application Settings
app.name=Online Quiz System
app.version=1.0.0
app.quiz.timeout=60
app.quiz.total.questions=5
app.max.score=100
